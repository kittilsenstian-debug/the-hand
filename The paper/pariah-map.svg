<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#2a2520" stroke-width="1"/>
    </marker>
    <style>
      .label-mono { font-family: 'Helvetica Neue', 'Arial', sans-serif; }
      .label-serif { font-family: 'Georgia', 'Times New Roman', serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#faf8f5"/>

  <!-- ==================== TENDONS (finger to palm curves) ==================== -->
  <g id="tendons" opacity="0.8">
    <!-- O'N (thumb) to palm -->
    <path d="M350,380 Q455,440 590,475" fill="none" stroke="#d8d2ca" stroke-width="1.5"/>
    <!-- J1 (index) to palm -->
    <path d="M470,180 Q518,340 590,475" fill="none" stroke="#d8d2ca" stroke-width="1.5"/>
    <!-- J3 (middle) to palm -->
    <path d="M600,140 Q596,320 590,475" fill="none" stroke="#d8d2ca" stroke-width="1.5"/>
    <!-- J4 (ring) to palm -->
    <path d="M720,175 Q668,340 590,475" fill="none" stroke="#d8d2ca" stroke-width="1.5"/>
    <!-- Ly (pinky) to palm -->
    <path d="M830,260 Q732,388 590,475" fill="none" stroke="#d8d2ca" stroke-width="1.5"/>
    <!-- Palm to wrist -->
    <line x1="590" y1="505" x2="590" y2="623" stroke="#d8d2ca" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- ==================== AXES (grip groups) ==================== -->
  <g id="axes">
    <!-- KNOWING circle: thumb + index precision grip -->
    <circle cx="410" cy="280" r="120" fill="none" stroke="#9a6a3a" stroke-width="1" stroke-dasharray="5,5" opacity="0.35"/>
    <text x="410" y="284" fill="#9a6a3a" class="label-mono" font-size="9" letter-spacing="3" text-anchor="middle" opacity="0.6">KNOWING</text>

    <!-- HOLDING arc: middle to pinky power grip -->
    <path d="M600,128 Q715,80 830,248" fill="none" stroke="#9a6a3a" stroke-width="1" stroke-dasharray="5,5" opacity="0.35"/>
    <text x="715" y="98" fill="#9a6a3a" class="label-mono" font-size="9" letter-spacing="3" text-anchor="middle" opacity="0.5">HOLDING</text>

    <!-- MAKING: ring to palm (highlighted tendon) -->
    <path d="M720,175 Q668,340 590,475" fill="none" stroke="#9a6a3a" stroke-width="1.2" stroke-dasharray="5,5" opacity="0.35"/>
    <text x="692" y="332" fill="#9a6a3a" class="label-mono" font-size="9" letter-spacing="3" text-anchor="start" opacity="0.5">MAKING</text>
  </g>

  <!-- ==================== CONTAINMENT (J1 ⊂ O'N) ==================== -->
  <g id="containment">
    <line x1="488" y1="200" x2="368" y2="362" stroke="#2a2520" stroke-width="1.5" opacity="0.3" marker-end="url(#arrow)"/>
    <text x="395" y="270" fill="#2a2520" class="label-mono" font-size="9" letter-spacing="1" text-anchor="middle" opacity="0.35">J₁ ⊂ O'N</text>
  </g>

  <!-- ==================== SHADOW CHAIN (wrist → E7 → E8 → Monster) ==================== -->
  <g id="shadow-chain" opacity="0.7">
    <!-- Wrist node (2.Ru) -->
    <circle cx="590" cy="635" r="18" fill="none" stroke="#7a8a9a" stroke-width="1.5" stroke-dasharray="2,4" opacity="0.35"/>
    <text x="562" y="639" fill="#7a8a9a" class="label-mono" font-size="11" text-anchor="end" opacity="0.7">2.Ru</text>
    <text x="562" y="652" fill="#7a8a9a" class="label-mono" font-size="8" text-anchor="end" opacity="0.4">28-dim — the shadow</text>
    <text x="618" y="639" fill="#7a8a9a" class="label-mono" font-size="8" text-anchor="start" opacity="0.3" font-style="italic">only pariah with a shadow</text>
    <circle cx="590" cy="635" r="2.5" fill="#7a8a9a" opacity="0.4"/>

    <!-- Chain links -->
    <line x1="590" y1="653" x2="590" y2="697" stroke="#7a8a9a" stroke-width="1" opacity="0.3" stroke-dasharray="3,4"/>
    <circle cx="590" cy="705" r="6" fill="none" stroke="#7a8a9a" stroke-width="1" opacity="0.6"/>
    <text x="606" y="709" fill="#7a8a9a" class="label-mono" font-size="10" text-anchor="start" opacity="0.6">E₇</text>
    <text x="606" y="721" fill="#7a8a9a" class="label-mono" font-size="8" text-anchor="start" opacity="0.36">56-dim fundamental</text>

    <line x1="590" y1="713" x2="590" y2="752" stroke="#7a8a9a" stroke-width="1" opacity="0.24" stroke-dasharray="3,4"/>
    <circle cx="590" cy="760" r="6" fill="none" stroke="#7a8a9a" stroke-width="1" opacity="0.48"/>
    <text x="606" y="764" fill="#7a8a9a" class="label-mono" font-size="10" text-anchor="start" opacity="0.48">E₈</text>
    <text x="606" y="776" fill="#7a8a9a" class="label-mono" font-size="8" text-anchor="start" opacity="0.29">248 roots</text>

    <line x1="590" y1="768" x2="590" y2="804" stroke="#7a8a9a" stroke-width="1" opacity="0.18" stroke-dasharray="3,4"/>
    <circle cx="590" cy="812" r="6" fill="none" stroke="#7a8a9a" stroke-width="1" opacity="0.36"/>
    <text x="606" y="816" fill="#7a8a9a" class="label-mono" font-size="10" text-anchor="start" opacity="0.36">Monster</text>
    <text x="606" y="828" fill="#7a8a9a" class="label-mono" font-size="8" text-anchor="start" opacity="0.22">744 = 3 × 248</text>

    <!-- Fade to infinity -->
    <line x1="590" y1="820" x2="590" y2="870" stroke="#7a8a9a" stroke-width="1" opacity="0.12"/>
    <text x="606" y="855" fill="#7a8a9a" class="label-mono" font-size="8" text-anchor="start" opacity="0.2" font-style="italic">j(j(1/φ)) → ∞</text>
  </g>

  <!-- ==================== NODES ==================== -->

  <!-- === O'N — The Sensor (thumb) === -->
  <g id="node-on">
    <circle cx="350" cy="380" r="17" fill="none" stroke="#8a5a7a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.5"/>
    <circle cx="350" cy="380" r="22" fill="none" stroke="#8a5a7a" stroke-width="1.5" opacity="0.5"/>
    <circle cx="350" cy="380" r="3.5" fill="#8a5a7a" opacity="0.8"/>
    <!-- Labels (left of thumb) -->
    <text x="312" y="368" fill="#2a2520" class="label-serif" font-size="15" font-weight="400" text-anchor="end">The Sensor</text>
    <text x="312" y="383" fill="#6a6560" class="label-mono" font-size="10" letter-spacing="1" text-anchor="end">O'N</text>
    <text x="312" y="398" fill="#7a2a6a" class="label-mono" font-size="8" letter-spacing="2" text-anchor="end">EVERYWHERE</text>
    <text x="312" y="413" fill="#a5a09a" class="label-mono" font-size="9" letter-spacing="1" text-anchor="end">thumb</text>
  </g>

  <!-- === J1 — The Seer (index) === -->
  <g id="node-j1">
    <circle cx="470" cy="180" r="17" fill="none" stroke="#9a6a3a" stroke-width="0.8" opacity="0.5"/>
    <circle cx="470" cy="180" r="22" fill="none" stroke="#9a6a3a" stroke-width="1.5" opacity="0.5"/>
    <circle cx="470" cy="180" r="3.5" fill="#9a6a3a" opacity="0.8"/>
    <!-- Labels (above) -->
    <text x="470" y="148" fill="#2a2520" class="label-serif" font-size="15" font-weight="400" text-anchor="middle">The Seer</text>
    <text x="470" y="134" fill="#6a6560" class="label-mono" font-size="10" letter-spacing="1" text-anchor="middle">J₁</text>
    <text x="470" y="120" fill="#2a7a2a" class="label-mono" font-size="8" letter-spacing="2" text-anchor="middle">WORKS</text>
    <text x="470" y="106" fill="#a5a09a" class="label-mono" font-size="9" letter-spacing="1" text-anchor="middle">index</text>
  </g>

  <!-- === J3 — The Builder (middle) === -->
  <g id="node-j3">
    <circle cx="600" cy="140" r="17" fill="none" stroke="#5a7a4a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.5"/>
    <circle cx="600" cy="140" r="22" fill="none" stroke="#5a7a4a" stroke-width="1.5" opacity="0.5"/>
    <circle cx="600" cy="140" r="3.5" fill="#5a7a4a" opacity="0.8"/>
    <!-- Labels (above) -->
    <text x="600" y="108" fill="#2a2520" class="label-serif" font-size="15" font-weight="400" text-anchor="middle">The Builder</text>
    <text x="600" y="94" fill="#6a6560" class="label-mono" font-size="10" letter-spacing="1" text-anchor="middle">J₃</text>
    <text x="600" y="80" fill="#5a7a2a" class="label-mono" font-size="8" letter-spacing="2" text-anchor="middle">FUSED</text>
    <text x="600" y="66" fill="#a5a09a" class="label-mono" font-size="9" letter-spacing="1" text-anchor="middle">middle</text>
  </g>

  <!-- === J4 — The Mystic (ring) === -->
  <g id="node-j4">
    <circle cx="720" cy="175" r="17" fill="none" stroke="#5a7a4a" stroke-width="0.8" stroke-dasharray="2,4" opacity="0.5"/>
    <circle cx="720" cy="175" r="22" fill="none" stroke="#5a7a4a" stroke-width="1.5" opacity="0.5"/>
    <circle cx="720" cy="175" r="3.5" fill="#5a7a4a" opacity="0.8"/>
    <!-- Labels (above) -->
    <text x="720" y="143" fill="#2a2520" class="label-serif" font-size="15" font-weight="400" text-anchor="middle">The Mystic</text>
    <text x="720" y="129" fill="#6a6560" class="label-mono" font-size="10" letter-spacing="1" text-anchor="middle">J₄</text>
    <text x="720" y="115" fill="#9a2a2a" class="label-mono" font-size="8" letter-spacing="2" text-anchor="middle">IMPOSSIBLE</text>
    <text x="720" y="101" fill="#a5a09a" class="label-mono" font-size="9" letter-spacing="1" text-anchor="middle">ring</text>
  </g>

  <!-- === Ly — The Still One (pinky) === -->
  <g id="node-ly">
    <circle cx="830" cy="260" r="17" fill="none" stroke="#9a6a3a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.5"/>
    <circle cx="830" cy="260" r="22" fill="none" stroke="#9a6a3a" stroke-width="1.5" opacity="0.5"/>
    <circle cx="830" cy="260" r="3.5" fill="#9a6a3a" opacity="0.8"/>
    <!-- Labels (above) -->
    <text x="830" y="228" fill="#2a2520" class="label-serif" font-size="15" font-weight="400" text-anchor="middle">The Still One</text>
    <text x="830" y="214" fill="#6a6560" class="label-mono" font-size="10" letter-spacing="1" text-anchor="middle">Ly</text>
    <text x="830" y="200" fill="#7a6a2a" class="label-mono" font-size="8" letter-spacing="2" text-anchor="middle">BREAKS</text>
    <text x="830" y="186" fill="#a5a09a" class="label-mono" font-size="9" letter-spacing="1" text-anchor="middle">pinky</text>
  </g>

  <!-- === Ru — The Artist (palm) === -->
  <g id="node-ru">
    <circle cx="590" cy="475" r="27" fill="none" stroke="#4a6a8a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.5"/>
    <circle cx="590" cy="475" r="32" fill="none" stroke="#4a6a8a" stroke-width="2" opacity="0.5"/>
    <circle cx="590" cy="475" r="5" fill="#4a6a8a" opacity="0.8"/>
    <circle cx="590" cy="475" r="40" fill="none" stroke="#4a6a8a" stroke-width="0.5" opacity="0.15"/>
    <!-- Equation in palm -->
    <text x="590" y="474" fill="#d5d0ca" class="label-mono" font-size="12" letter-spacing="2" text-anchor="middle">q + q² = 1</text>
    <!-- Labels (below) -->
    <text x="590" y="525" fill="#2a2520" class="label-serif" font-size="17" font-weight="400" text-anchor="middle">The Artist</text>
    <text x="590" y="540" fill="#6a6560" class="label-mono" font-size="10" letter-spacing="1" text-anchor="middle">Ru</text>
    <text x="590" y="555" fill="#2a5a7a" class="label-mono" font-size="8" letter-spacing="2" text-anchor="middle">PERPENDICULAR</text>
    <text x="590" y="570" fill="#a5a09a" class="label-mono" font-size="9" letter-spacing="1" text-anchor="middle">palm</text>
  </g>

  <!-- ==================== TITLE ==================== -->
  <text x="24" y="32" fill="#6a6560" class="label-mono" font-size="11" font-weight="300" letter-spacing="6" text-transform="uppercase">THE HAND</text>
  <text x="24" y="48" fill="#a5a09a" class="label-mono" font-size="10" letter-spacing="2">five fingers, one palm, one wrist — q + q² = 1</text>

  <!-- ==================== LEGEND ==================== -->
  <g id="legend">
    <text x="20" y="832" fill="#a5a09a" class="label-mono" font-size="10" letter-spacing="1">THUMB + INDEX = KNOWING (precision grip)</text>
    <text x="20" y="852" fill="#a5a09a" class="label-mono" font-size="10" letter-spacing="1">MIDDLE … PINKY = HOLDING (power grip)</text>
    <text x="20" y="872" fill="#a5a09a" class="label-mono" font-size="10" letter-spacing="1">RING + PALM = MAKING (tendon)</text>
  </g>

  <!-- ==================== PARIAH PRIMES (37 link) ==================== -->
  <g id="pariah-primes" opacity="0.6">
    <line x1="830" y1="260" x2="720" y2="175" stroke="#9a4a3a" stroke-width="1" stroke-dasharray="3,5" opacity="0.5"/>
    <text x="795" y="211" fill="#9a4a3a" class="label-mono" font-size="10" text-anchor="middle" opacity="0.7">37</text>
    <text x="795" y="225" fill="#9a4a3a" class="label-mono" font-size="8" text-anchor="middle" opacity="0.4">37+43 = 80</text>
    <text x="858" y="290" fill="#9a4a3a" class="label-mono" font-size="9" text-anchor="start" opacity="0.55">67 (genus 5)</text>
    <text x="692" y="211" fill="#9a4a3a" class="label-mono" font-size="9" text-anchor="end" opacity="0.55">43 (genus 3)</text>
  </g>

</svg>