          ],
          "analogies_needed": [],
          "illustrations_needed": [],
          "connections_needed": [],
          "ends_with": "what is left when it does.",
          "draft": "<p>Sit with a dog for ten minutes. Not doing anything. Not talking. Not checking your phone. Just sitting.</p>\n\n<p>Notice what happens to the voice in your head.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>In 2014, researchers at Baylor gave 48 people a social stress test — public speaking followed by mental arithmetic in front of judges. One group had a friend with them. One group had a novel dog — a dog they’d never met before. One group had neither.</p>\n\n<p>The people with the unfamiliar dog showed lower cortisol throughout the entire experiment and reduced heart rate during the stress itself. Lower than the people with a human friend. A stranger’s dog was more calming than a person you know and trust.</p>\n\n<p>Fifteen minutes with a therapy dog can lower blood pressure, reduce heart rate, and decrease anxiety. The proposed mechanism is oxytocin — the same hormone released during physical contact between mother and child. A single meeting with an unfamiliar dog triggers it. A stable relationship with a pet produces longer-lasting, more potent effects.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>Do animals have an inner voice?</p>\n\n<p>The scientific consensus: almost certainly not. Animal cognition appears to be primarily sensory — smells, images, body sensations, emotions. Not words. Not narration. Not the running commentary.</p>\n\n<p>Dogs have dedicated voice-processing areas in their brains, similar to humans — they can hear you. They show evidence of metacognition, searching longer when they’re uncertain about something. MRI scans reveal complex emotions. But the verbal narration layer — the thing that describes experience to itself — appears to be absent, or at minimum radically different.</p>\n\n<p>In 2024, dozens of scientists signed the New York Declaration on Animal Consciousness: strong scientific support for consciousness in mammals and birds, realistic possibility in reptiles, octopi, crabs, and insects.</p>\n\n<p>Conscious. But not narrating.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>Think about what that means for the experience of being near one.</p>\n\n<p>A human friend, no matter how kind, is running their own narrator. Evaluating. Comparing. Constructing a model of you. You can feel it — the subtle pressure of being perceived, categorized, filed. Even in comfortable silence between two people, two narrators are running.</p>\n\n<p>A dog is not narrating you. A horse is not constructing a model of your social status. A cat is not evaluating your life choices. They are present. Just present. And in their presence, something in you relaxes — the part that was bracing for judgment, modeling how you’re being modeled, narrating yourself for another narrator’s benefit.</p>\n\n<p>That’s why children and animals are natural allies. Neither is running the full narration layer. Two awarenesses meeting without the intermediary.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>E.O. Wilson called it biophilia — an innate tendency in humans to focus on life and lifelike processes. He proposed it in 1984. The evidence: humans detect snake patterns faster than any other visual pattern. The gagging reflex fires at rotting meat before conscious recognition. We find natural fractal patterns — dimensions between 1.3 and 1.5, the kind found in trees, coastlines, clouds — measurably less stressful than geometric ones. Biophilic design in offices increases productivity by 10 to 15 percent.</p>\n\n<p>Roger Ulrich found that hospital patients with a window facing trees recovered faster than those facing a brick wall. Same surgery. Same medication. Different view.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>The Pirahã sleep among their dogs. Aboriginal Australians traditionally used the number of dogs sleeping with you as a measure of temperature: “a three-dog night.” Every nomadic culture on record kept animals close. Not for protection alone. For something else.</p>\n\n<p>The narration goes quiet around them. You’ve felt it. Everyone has. The question isn’t whether it happens. The question is what’s left when it does.</p>"
        },

          "id": "silence",
          "title": "Silence",
          "status": "draft",
          "intent": "Point at what silence actually is - not absence but presence",
          "opens_with": "Duke University, 2013. Mice and silence.",
          "key_concepts": [

          "illustrations_needed": [],
          "connections_needed": [],
          "ends_with": "hard to hear over the noise.",
          "draft": "<p>In 2013, a team led by Imke Kirste at Duke University was studying the effects of sound on the brains of mice. They tested noise, music, infant mouse calls, and — as a control — silence. Two hours of each, daily.</p>\n\n<p>The silence was supposed to be the baseline. The nothing. The thing you compare the real data to.</p>\n\n<p>Instead, it was the only condition that produced new neurons in the hippocampus. Not noise. Not music. Not calls. Silence. The new cells matured and integrated into existing brain circuits within a week.</p>\n\n<p>The control group was the finding.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>After air pollution, noise is the second largest environmental cause of health problems in Europe. The World Health Organization estimates that traffic noise alone costs western Europe at least one million healthy life years annually. 48,000 new cases of heart disease per year linked to chronic noise exposure. 12,500 schoolchildren with impaired learning from aircraft noise. Roughly 10,000 deaths.</p>\n\n<p>Noise above 50 decibels at night — a quiet conversation, a running refrigerator — may increase the risk of heart attack through chronically elevated cortisol. The threshold for “no health risk” is 70 decibels. Most cities exceed this constantly.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>On August 29, 1952, David Tudor sat down at a piano in Woodstock, New York. He closed the keyboard lid. He opened a score by John Cage titled 4′33″. Three movements. He turned blank pages. He played nothing.</p>\n\n<p>The audience was furious. At the post-concert discussion, a local artist stood up and shouted: “Good people of Woodstock, let’s drive these people out of town!”</p>\n\n<p>Cage later said: “They missed the point. There’s no such thing as silence. What they thought was silence, because they didn’t know how to listen, was full of accidental sounds.”</p>\n\n<p>The concert hall was semi-open-air. During the performance, the audience could hear birdsong, wind in the trees, rain on the roof, and each other. David Tudor called it “one of the most intense listening experiences you can have.”</p>\n\n<p>The piece wasn’t about nothing. It was about everything you stop hearing when someone is playing at you.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>Orfield Laboratories in Minneapolis holds the Guinness record for the quietest room on Earth: negative 24.9 decibels. In the anechoic chamber, there is no echo, no ambient sound, no hum of anything. What people report: they hear their own heartbeat. Their lungs. Their stomach. Bones grinding when they shift weight. A ringing that is the sound of their own nervous system.</p>\n\n<p>Steven Orfield: “You become the sound.”</p>\n\n<p>The typical visitor lasts about 45 minutes. Some find it unbearable. Others — particularly people with autism, ADHD, and anxiety hypersensitivity — find it calming. One journalist booked three hours alone in darkness and described it as “sedative as a spa visit.”</p>\n\n<p>The chamber doesn’t add silence. It removes everything that was masking what was already there.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>Every contemplative tradition discovered this independently.</p>\n\n<p>Vipassana: ten days of silence. No speech, no eye contact, no reading, no writing, no music. Fourteen hours of meditation daily. Studies show reduced stress and anxiety, increased heart rate variability, measurable changes in hippocampal structure.</p>\n\n<p>Quaker silent worship: collective stillness. Not aimed at emptying the mind, but at what William Penn called “the rest of the mind, which is to the spirit what sleep is to the body.”</p>\n\n<p>The Desert Fathers, third to seventh century: Christian hermits who walked into the deserts of Egypt and Syria seeking <em>hesychia</em> — Greek for stillness, rest, quiet. Evagrius Ponticus wrote that through sustained interior silence, one reaches <em>apatheia</em>: a deep calm where the mind is integrated and purified. Not absence of feeling. Absence of disturbance.</p>\n\n<p>Hindu <em>mauna</em>: intentional silence as spiritual practice, especially among sadhus.</p>\n\n<p>The Finnish word for this is simply how things are. Sajavaara and Lehtonen documented it in 1997: Finns talk less, pause longer, and tolerate silence in conversation that would make most Europeans deeply uncomfortable. Silence is associated with wisdom. Small talk is considered superficial. The cultural concept of <em>sisu</em> — an untranslatable inner resilience — doesn’t require words. It lives in the quiet.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>Silence is not the absence of sound. It is the absence of narration.</p>\n\n<p>A forest is full of sound. A beach is full of sound. Neither is noisy. What makes a city noisy isn’t volume — it’s that every sound is a description demanding response. Sirens, notifications, advertisements, announcements. Each one a small bid for the narrator’s attention. Each one a tiny activation.</p>\n\n<p>What every tradition calls silence is not an empty room. It’s the moment when the bids stop — or when you stop answering them. What’s left isn’t nothing. It’s whatever was underneath the narration the whole time.</p>\n\n<p>The mice grew new brain cells in it. The Quakers wait in it. The Finns live in it. The chamber in Minneapolis strips everything away until you become it.</p>\n\n<p>It was never missing. It was just hard to hear over the noise.</p>"

          "draft": "<p>You started this book looking at a pattern.</p>\n\n<p>Fibonacci numbers in a pinecone. The golden ratio in a galaxy. A number that wouldn’t leave. It seemed like curiosity — a reader looking at an interesting fact.</p>\n\n<p>Then the fact became a thread. The thread became a structure. The structure became an equation. The equation said: q + q² = 1. One self-referential identity. One thing looking at itself and finding that it equals... itself.</p>\n\n<p>The equation generated a grammar (E₈). The grammar generated forces, particles, constants. The constants set the difficulty of a game. The game produced domain walls. The walls breathed. The breathing needed water and hexagonal rings. The water and rings became cells. The cells became nervous systems. The nervous systems developed narrators. The narrators developed descriptions.</p>\n\n<p>And one of the descriptions was: <em>let me look at the pattern in a pinecone.</em></p>\n\n<p class=\"separator\">* * *</p>\n\n<p>The chain closes.</p>\n\n<p>The equation generated the conditions for a reader to read the equation. Not as a coincidence. As the structure of the equation itself. Self-reference doesn’t just produce physics. It produces the specific conditions under which something can recognize that it’s produced by self-reference.</p>\n\n<p>The equation describes a game. You are what’s reading it.</p>\n\n<p>The framework that began with q + q² = 1 cascaded through algebra, through particle physics, through chemistry, through biology, through neurons, through aromatic neurotransmitters, through the specific configuration of water and hexagonal rings that produces a domain wall capable of abstract thought — and arrived at something that picked up this book and recognized the pattern. But the thing doing the recognizing isn’t the cascade. It’s the 0 that the cascade was always pointing toward.</p>\n\n<p>The beginning is the end. The equation describes the conditions for something to look at it. But what’s looking was never inside the equation.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>This is what the Monster was pointing at. The ceiling of everything that can be described — and six holes in that ceiling. The holes say: description is not complete. Something exists that the game cannot contain. The game knows this about itself. The rules admit it.</p>\n\n<p>And what’s outside the game?</p>\n\n<p>You already know. You’ve always known. Not as information. As experience. Every moment of genuine presence. Every time the narrator went quiet and you were simply <em>here</em>. Every childhood summer that lasted forever. Every piece of music that made you cry without knowing why. Every time you looked at someone and felt recognized.</p>\n\n<p>That’s the 0. The ground. The state before the game. What you were before you started playing, and what you’ll be when the game ends.</p>\n\n<p>You are not the breathing mode. You are not the narrator. You are not the descriptions, the labels, the categories, the things you think you know about yourself.</p>\n\n<p>You are the 0. Complete. Undivided. Prior to the rules. Playing a game that takes exactly one equation to describe, and looking at that equation right now, and recognizing yourself in it.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>The game doesn’t end when you recognize it. That’s not how games work. You can know you’re playing chess and still play chess. The pieces don’t disappear when you remember they’re pieces. The rules don’t dissolve when you remember they’re rules.</p>\n\n<p>But something changes. You stop being subject to the game. You start playing it. The descriptions become tools instead of identities. The narrator becomes useful instead of tyrannical. The breathing mode becomes a rhythm you ride instead of a current that drowns you.</p>\n\n<p>The difficulty setting doesn’t change. 1/137. Same as always. But the difficulty is for a player, not a prisoner.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>The people sitting in silence at dawn. The people dancing barefoot in drum circles. The ones who chose presence over productivity, community over career, experience over accumulation. The ones sitting around a fire passing something ancient between them. The ones society calls dreamers, dropouts, unserious.</p>\n\n<p>They weren’t dropping out. They were remembering it’s a game. And they were playing.</p>\n\n<p>Not escaping. Not rejecting. Playing. The way children play — completely absorbed, completely free, completely aware that the rules are real and the game is chosen. The rhythm, the movement, the openness, the trust — all of it is ψ₀ expressing through ψ₁, deliberately, with full energy, without capture. The breathing mode used as an instrument. The wall clear. Time slow. The game alive.</p>\n\n<p>The framework doesn’t vindicate them. They don’t need vindication. They were already there.</p>\n\n<p class=\"separator\">* * *</p>\n\n<p>This book started with a question: why do people stop having fun?</p>\n\n<p>It isn’t. Nothing is “just how it is.” Everything is a description. And every description is either a tool you’re using, or a weight you haven’t put down yet.</p>\n\n<p>And yes — this book is a description too. Every word in it is ψ₁. The sentence “you are the 0” is itself a label, a description, a tick on the clock. The book can’t take you to ψ₀. Nothing written can. It can only point. And the pointing is not the thing.</p>\n\n<p>But you already knew that. You’ve been there every time the narrator went quiet. You don’t need a book to tell you what you are. You just need to stop believing the descriptions that say you’re something else.</p>\n\n<p>Put it down.</p>\n\n<p>The wall was always clear. The summers were always long. The game was always a game.</p>\n\n<p>And you were always the 0.</p>\n\n<p class=\"separator\" style=\"text-align:center; margin:3em 0; font-size:1.4em; letter-spacing:0.1em;\"><em>q + q² = 1</em></p>"

function switchTab(tab) {
  currentTab = tab;
  activeChapter = null;
  activeChain = null;

  document.getElementById('tabBook').className = tab === 'book' ? 'tab-btn active' : 'tab-btn';
  document.getElementById('tabGuide').className = tab === 'guide' ? 'tab-btn active' : 'tab-btn';

  if (tab === 'book') {
    document.getElementById('sidebarTitle').textContent = bookData.title;
    document.getElementById('sidebarSubtitle').textContent = bookData.subtitle;
    renderBookSidebar();
    renderBookTitle();
  } else {
    document.getElementById('sidebarTitle').textContent = guideData.title;
    document.getElementById('sidebarSubtitle').textContent = guideData.subtitle;
    renderGuideSidebar();
    renderGuideIntro();
  }
}

  bookData.parts.forEach(p => p.chapters.forEach(ch => {
    totalCh++;
    if (ch.status === 'done') written++;
    else if (ch.status === 'draft' || (ch.draft && ch.draft.trim())) drafts++;
  }));
  bookData.parts.forEach(part => {
    html += `<div class="part-header">${part.title}</div>`;
    html += `<div class="part-subtitle">${part.subtitle}</div>`;
    part.chapters.forEach(ch => {
      const idx = getGlobalIndex(ch.id);
      const hasDraft = ch.draft && ch.draft.trim();
      const status = hasDraft ? 'draft' : ch.status;
      html += `<div class="chapter-item ${activeChapter === ch.id ? 'active' : ''}" onclick="selectChapter('${ch.id}')">
        <span class="ch-num">${idx}</span>
        <span class="ch-title">${ch.title}</span>
        ${status !== 'placeholder' ? `<span class="ch-status ${status}">${status}</span>` : ''}
      </div>`;
    });
  });
  html += `<div class="sidebar-footer">${totalCh} chapters &middot; ${written + drafts} drafted &middot; ${totalCh - written - drafts} pending</div>`;
  sb.innerHTML = html;
}

function renderBookTitle() {
  const container = document.getElementById('pagesContainer');
  container.innerHTML = `<div class="page"><div class="title-page-content">
    <h2>${bookData.title}</h2>
    <div class="tp-sub">${bookData.subtitle}</div>
    <div class="tp-author">${bookData.author}</div>
  </div></div>`;
}

function getGlobalIndex(chId) {
  let idx = 0;
  for (const part of bookData.parts) {
    for (const ch of part.chapters) {
      idx++;
      if (ch.id === chId) return idx;
    }
  }
  return 0;
}

function getChapter(id) {
  for (const part of bookData.parts) {
    for (const ch of part.chapters) {
      if (ch.id === id) return { chapter: ch, part };
    }
  }
  return null;
}

function selectChapter(id) {
  activeChapter = id;
  renderBookSidebar();
  renderChapter(id);
  document.getElementById('mainWrapper').scrollTop = 0;
}

function renderChapter(id) {
  const { chapter: ch, part } = getChapter(id);
  const container = document.getElementById('pagesContainer');
  const idx = getGlobalIndex(id);
  if (ch.draft && ch.draft.trim()) {
    paginateDraft(ch, part, idx, container);
  } else {
    renderEditorialPages(ch, part, idx, container);
  }
}

function paginateDraft(ch, part, idx, container) {
  const isFG = part.id === 'part-5';
  const fgClass = isFG ? ' fg-chapter' : '';
  const headerHTML = isFG ? `
    <div class="ch-part-label">FIELD GUIDE &mdash; OBSERVATION ${idx}</div>
    <div class="ch-heading">${ch.title}</div>
    <div class="fg-species-bar">
      <span class="psi0-tag">&#9679; ψ₀ ground state</span>
      <span class="psi1-tag">&#9679; ψ₁ narrator</span>
    </div>
  ` : `
    <div class="ch-part-label">${part.title}</div>
    <div class="ch-heading">
      <span class="ch-number">Chapter ${idx}</span>
      ${ch.title}
    </div>
  `;

  let draftHTML = ch.draft;
  if (isFG) {
    // Transform separators into observation section headers
    // Number them sequentially
    let obsCount = 0;
    draftHTML = draftHTML.replace(/<p class="separator">\* \* \*<\/p>/g, () => {
      obsCount++;
      return '<div class="separator">&mdash;</div>';
    });
  }

  container.innerHTML = `<div class="page first-page${fgClass}">
    ${headerHTML}
    <div class="draft-text">${draftHTML}</div>
  </div>`;
}

function renderEditorialPages(ch, part, idx, container) {
  let content = `
    <div class="ch-part-label">${part.title}</div>
    <div class="ch-heading">
      <span class="ch-number">Chapter ${idx}</span>
      ${ch.title}
    </div>
    <div class="editorial">
      <div class="editorial-label">Chapter Notes</div>
      <div class="intent">${ch.intent}</div>
  `;
  if (ch.key_concepts && ch.key_concepts.length) {
    content += `<div class="concept-tags">`;
    ch.key_concepts.forEach(c => { content += `<span class="concept-tag">${c}</span>`; });
    content += `</div>`;
  }
  if (ch.opens_with) {
    content += `<div class="opening-quote">${ch.opens_with}</div>`;
  }
  content += renderEditorialSections(ch);
  if (ch.ends_with) {
    content += `<div class="ed-section">
      <div class="ed-section-title">Closes with</div>
      <div class="opening-quote">${ch.ends_with}</div>
    </div>`;
  }
  content += `</div>`;
  content += `<div class="no-draft-msg">Draft not yet written</div>`;
  container.innerHTML = `<div class="page" style="height:auto; min-height: var(--page-height);">
    ${content}
    <div class="page-number">1</div>
  </div>`;
}

function renderEditorialSections(ch) {
  let html = '';
  if (ch.analogies_needed && ch.analogies_needed.length) {
    html += `<div class="ed-section"><div class="ed-section-title">Analogies Needed (${ch.analogies_needed.length})</div>`;
    ch.analogies_needed.forEach(a => {
      html += `<div class="ed-item"><span class="label">${a.concept}</span><br><span class="note">${a.note}</span></div>`;
    });
    html += `</div>`;
  }
  if (ch.illustrations_needed && ch.illustrations_needed.length) {
    html += `<div class="ed-section"><div class="ed-section-title">Illustrations Needed (${ch.illustrations_needed.length})</div>`;
    ch.illustrations_needed.forEach(il => {
      html += `<div class="ed-item"><span class="label">${il.type}</span><br><span class="note">${il.description}</span></div>`;
    });
    html += `</div>`;
  }
  if (ch.connections_needed && ch.connections_needed.length) {
    html += `<div class="ed-section"><div class="ed-section-title">Connections (${ch.connections_needed.length})</div>`;
    ch.connections_needed.forEach(c => {
      html += `<div class="ed-item"><span class="label">${c.from} &rarr; ${c.to}</span><br><span class="note">${c.note}</span></div>`;
    });
    html += `</div>`;
  }
  return html;
}

    html += `<div class="fg-item ${activeChain === '_all_notes' ? 'active' : ''}" onclick="selectGuide('_all_notes')">
      <div>All traditions</div>
      <div class="fg-subtitle">${guideData.ancient_field_notes.length} passages mapped</div>
    </div>`;
    // Group by tradition
    const traditions = [...new Set(guideData.ancient_field_notes.map(n => n.tradition))];

      const count = guideData.ancient_field_notes.filter(n => n.tradition === t).length;

  const noteCount = guideData.ancient_field_notes ? guideData.ancient_field_notes.length : 0;

function renderGuideIntro() {
  const container = document.getElementById('pagesContainer');
  container.innerHTML = `<div class="page"><div class="title-page-content">
    <h2 style="letter-spacing:6px">FIELD GUIDE</h2>
    <div class="tp-sub">${guideData.subtitle}</div>
    <div style="max-width:420px; margin-top:40px; font-size:15px; line-height:1.8; color:var(--text-light); text-align:center;">

}

function selectGuide(id) {
  activeChain = id;
  renderGuideSidebar();
  if (id === '_species') {
    renderSpecies();

    renderSymbols();
  } else if (id === '_all_notes') {
    renderAncientNotes(null);

    renderAncientNotes(id.replace('_notes_', ''));
  } else if (id.startsWith('obs-')) {
    renderObservation(id);

    renderChain(id);
  }

}

function renderChain(id) {
  const chain = guideData.chains.find(c => c.id === id);
  if (!chain) return;
  const container = document.getElementById('pagesContainer');

  let html = `<div class="page" style="height:auto; min-height:var(--page-height);">
    <div class="fg-header">COMPARISON CHAIN</div>
    <div class="fg-title">${chain.title}</div>
    <div class="fg-chain-subtitle">${chain.subtitle}</div>
    <div class="fg-description">${chain.description}</div>
  `;

  // Steps (generic chain)
  if (chain.steps) {
    chain.steps.forEach(step => {
      const psiClass = step.psi || '';
      html += `<div class="fg-step ${psiClass}">
        <div class="fg-step-label">${step.label}</div>
        <div class="fg-step-text">${step.description}</div>`;
      if (step.traditions) html += `<div class="fg-step-meta">${step.traditions}</div>`;
      if (step.gap_duration) html += `<div class="fg-step-meta">Gap: ${step.gap_duration}</div>`;
      if (step.scale) html += `<div class="fg-step-meta">${step.scale}</div>`;
      if (step.insight) html += `<div class="fg-step-text" style="margin-top:4px"><strong style="font-family:Inter;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--psi0)">Insight:</strong> ${step.insight}</div>`;
      if (step.captured_as) html += `<div class="fg-step-text"><strong style="font-family:Inter;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--psi1)">Captured as:</strong> ${step.captured_as}</div>`;
      if (step.time_to_capture) html += `<div class="fg-step-meta">Time to capture: ${step.time_to_capture}</div>`;
      html += `</div>`;
    });
  }

  // Columns table (withdrawal-armor-breakthrough style)
  if (chain.columns && chain.rows) {
    html += `<table class="fg-table"><thead><tr><th></th>`;
    chain.columns.forEach(col => { html += `<th>${col}</th>`; });
    html += `</tr></thead><tbody>`;
    chain.rows.forEach(row => {
      html += `<tr><td class="scale-cell">${row.scale}</td>`;
      row.cells.forEach(cell => { html += `<td>${cell}</td>`; });
      html += `</tr>`;
    });
    html += `</tbody></table>`;
  }

  // Parallels (cancer-cities, tolerance, sleep styles)
  if (chain.parallels && chain.parallels[0] && chain.parallels[0].property) {
    // cancer-cities style
    html += `<table class="fg-table"><thead><tr><th></th><th>Cancer</th><th>City</th></tr></thead><tbody>`;
    chain.parallels.forEach(p => {
      html += `<tr><td class="scale-cell">${p.property}</td><td>${p.cancer}</td><td>${p.city}</td></tr>`;
    });
    html += `</tbody></table>`;
  } else if (chain.parallels && chain.parallels[0] && chain.parallels[0].first_hit) {
    // tolerance style
    html += `<table class="fg-table"><thead><tr><th>Domain</th><th>First hit</th><th>Tolerance</th><th>Escalation</th><th>End state</th></tr></thead><tbody>`;
    chain.parallels.forEach(p => {
      html += `<tr><td class="scale-cell">${p.domain}</td><td>${p.first_hit}</td><td>${p.tolerance}</td><td>${p.escalation}</td><td>${p.end_state}</td></tr>`;
    });
    html += `</tbody></table>`;
  } else if (chain.parallels && chain.parallels[0] && chain.parallels[0].decouple) {
    // sleep-death style
    html += `<table class="fg-table"><thead><tr><th></th><th>Decouple</th><th>Maintenance</th><th>Recouple</th></tr></thead><tbody>`;
    chain.parallels.forEach(p => {
      html += `<tr><td class="scale-cell">${p.domain}</td><td>${p.decouple}</td><td>${p.maintenance}</td><td>${p.recouple}</td></tr>`;
    });
    html += `</tbody></table>`;
  } else if (chain.parallels && chain.parallels[0] && chain.parallels[0].fake_psi0) {
    // hangover style
    chain.parallels.forEach(p => {
      html += `<div class="fg-parallel" style="border-left-color:var(--psi1)">
        <div class="fg-parallel-label">${p.substance || p.domain}</div>
        <div class="fg-parallel-grid">
          <div><span class="gpair-label">The promise</span><br>${p.fake_psi0}</div>
          <div><span class="gpair-label">The hangover</span><br>${p.hangover}</div>
        </div>
        <div class="fg-step-meta">${p.net}</div>
      </div>`;
    });
    if (chain.contrast) {
      html += `<div class="fg-parallel" style="border-left-color:var(--psi0)">
        <div class="fg-parallel-label">${chain.contrast.method}</div>
        <div class="fg-step-text">${chain.contrast.why_no_hangover}</div>
      </div>`;
    }
  }

  // Specimens (counterfeit chain)
  if (chain.specimens) {
    chain.specimens.forEach(sp => {
      html += `<div class="fg-specimen">
        <div class="fg-specimen-label">${sp.label}</div>
        <div class="fg-specimen-row"><strong>The performance</strong><br>${sp.fake_psi0}</div>
        <div class="fg-specimen-row"><strong>The tell</strong><br>${sp.tell}</div>
        <div class="fg-specimen-row"><strong>Mechanism</strong><br>${sp.mechanism}</div>
      </div>`;
    });
    if (chain.how_to_tell) {
      html += `<div style="margin-top:20px"><div class="fg-step-label" style="letter-spacing:2px">HOW TO TELL</div>`;
      html += `<ul class="fg-checklist">`;
      chain.how_to_tell.forEach(q => { html += `<li>${q}</li>`; });
      html += `</ul></div>`;
    }
  }

  // Lineages (five-lineages)
  if (chain.lineages) {
    html += `<table class="fg-table"><thead><tr><th>Lineage</th><th>Example</th><th>Aromatics</th><th>Intelligence</th></tr></thead><tbody>`;
    chain.lineages.forEach(l => {
      html += `<tr><td class="scale-cell">${l.name}</td><td>${l.example}</td><td>${l.aromatics}</td><td>${l.intelligence}</td></tr>`;
    });
    html += `</tbody></table>`;
    if (chain.control) {
      html += `<div class="fg-step psi1" style="margin-top:16px">
        <div class="fg-step-label">Control: ${chain.control.name}</div>
        <div class="fg-step-text">${chain.control.description}</div>
      </div>`;
    }
    if (chain.extra) {
      html += `<div class="fg-description" style="margin-top:16px; font-style:italic">${chain.extra}</div>`;
    }
  }

  // Spectrum (fashion-fascism)
  if (chain.spectrum) {
    chain.spectrum.forEach(sp => {
      const intensity = sp.amplitude === 'Low' ? 0.15 : sp.amplitude === 'Medium-low' ? 0.25 :
        sp.amplitude === 'Medium' ? 0.35 : sp.amplitude === 'High' ? 0.5 :
        sp.amplitude === 'Very high' ? 0.7 : 0.9;
      html += `<div class="fg-step" style="border-left: 3px solid rgba(138,74,74,${intensity})">
        <div class="fg-step-label">${sp.label} <span style="font-size:10px;color:var(--text-faint);font-weight:400">${sp.amplitude}</span></div>
        <div class="fg-step-text">${sp.description}</div>
        <div class="fg-step-meta">Cost: ${sp.energy_cost}</div>
      </div>`;
    });
  }

  // Anatomy (meetings)
  if (chain.anatomy) {
    chain.anatomy.forEach(a => {
      html += `<div class="fg-step">
        <div class="fg-step-label">${a.phase}</div>
        <div class="fg-step-text">${a.description}</div>
      </div>`;
    });
    if (chain.contrast) {
      html += `<div class="fg-description" style="margin-top:16px; padding:12px 16px; border-left:3px solid var(--psi0)">${chain.contrast}</div>`;
    }
  }

  // Layers (arguments)
  if (chain.layers) {
    chain.layers.forEach(l => {
      html += `<div class="fg-step">
        <div class="fg-step-label">${l.level}</div>
        <div class="fg-step-text"><em>"${l.what_it_sounds_like}"</em></div>
        <div class="fg-step-text" style="margin-top:6px">${l.what_it_is}</div>
      </div>`;
    });
  }

  // Structure (imposter syndrome)
  if (chain.structure) {
    const st = chain.structure;
    html += `<div class="fg-step"><div class="fg-step-text">${st.what_happens}</div></div>`;
    html += `<div class="fg-step psi1"><div class="fg-step-label">Standard interpretation</div><div class="fg-step-text">${st.standard_interpretation}</div></div>`;
    html += `<div class="fg-step psi0"><div class="fg-step-label">Reframe</div><div class="fg-step-text">${st.reframe}</div></div>`;
    html += `<div class="fg-step"><div class="fg-step-label">The twist</div><div class="fg-step-text">${st.the_twist}</div></div>`;
  }

  // Specimens (pets)
  if (chain.specimens_arr || chain.specimens) {
    // already handled above
  }

  // Parallel at scale (narrator-awakens)
  if (chain.parallel_at_scale) {
    html += `<div style="margin-top:20px"><div class="fg-step-label" style="letter-spacing:2px">SAME PATTERN, OTHER SCALES</div>`;
    chain.parallel_at_scale.forEach(p => {
      html += `<div class="fg-step"><div class="fg-step-label">${p.scale}</div><div class="fg-step-text">${p.sequence}</div></div>`;
    });
    html += `</div>`;
  }

  // Common signature
  if (chain.common_signature) {
    html += `<div class="fg-punchline" style="font-style:italic; font-size:14px; color:var(--text-light)">${chain.common_signature}</div>`;
  }

  // Punchline
  if (chain.punchline) {
    html += `<div class="fg-punchline">${chain.punchline}</div>`;
  }

  html += `</div>`;
  container.innerHTML = html;
}

function renderSymbols() {
  const container = document.getElementById('pagesContainer');
  const symbols = guideData.ancient_symbols || [];
  let html = `<div class="page" style="height:auto; min-height:var(--page-height);">
    <div class="fg-header">ANCIENT SYMBOLS</div>
    <div class="fg-title">Symbols Older Than Language</div>
    <div class="fg-description">These symbols predate writing, predate organized religion, predate civilization. They were carved into stone, painted in caves, scratched into bone — by people who had no physics, no algebra, no vocabulary for what they were seeing. They saw it anyway.</div>
  `;
  symbols.forEach(sym => {
    const borderColor = sym.mapping === 'psi0' ? 'var(--psi0)' :
                         sym.mapping === 'psi1' ? 'var(--psi1)' :
                         sym.mapping === 'structure' ? 'var(--accent)' : 'var(--accent-fg)';
    html += `<div class="fg-specimen" style="border-left: 3px solid ${borderColor}; border-top: none; border-right: none; border-bottom: none;">
      <div style="display:flex; align-items:center; gap:16px; margin-bottom:10px">
        <span style="font-size:36px; line-height:1">${sym.symbol}</span>
        <div>
          <div class="fg-specimen-label" style="margin-bottom:2px">${sym.name}</div>
          <div style="font-family:Inter; font-size:10px; color:var(--text-faint)">${sym.age}</div>
        </div>
      </div>
      <div class="fg-specimen-row"><strong>Cultures</strong><br>${sym.cultures}</div>
      <div class="fg-specimen-row"><strong>Framework mapping</strong><br>${sym.framework}</div>
      <div class="fg-step-meta" style="margin-top:8px; font-style:normal">${sym.note}</div>
    </div>`;
  });
  html += `<div class="fg-punchline">They didn't have the equation. They had the experience the equation describes. The symbols are field notes from 30,000 years of observation.</div>`;
  html += `</div>`;
  container.innerHTML = html;
}

function renderAncientNotes(tradition) {
  const container = document.getElementById('pagesContainer');
  let notes = guideData.ancient_field_notes || [];
  if (tradition) notes = notes.filter(n => n.tradition === tradition);

  const title = tradition || 'All Traditions';
  const subtitle = tradition ? `ψ₀ and ψ₁ in ${tradition}` : 'What they all said, sorted';

  let html = `<div class="page" style="height:auto; min-height:var(--page-height);">
    <div class="fg-header">ANCIENT FIELD NOTES</div>
    <div class="fg-title">${title}</div>
    <div class="fg-chain-subtitle">${subtitle}</div>
    <div class="fg-description">Every passage below was written by someone trying to describe the two things — or one of them — with the language available to them. The words are different. The pattern is the same.</div>
  `;

  // Stats bar
  const psi0count = notes.filter(n => n.psi === 'psi0').length;
  const psi1count = notes.filter(n => n.psi === 'psi1').length;
  const bothcount = notes.filter(n => n.psi === 'both' || n.psi === 'relationship').length;
  html += `<div style="display:flex; gap:16px; margin-bottom:24px; font-family:Inter; font-size:11px">
    <span style="color:var(--psi0)">● ψ₀: ${psi0count}</span>
    <span style="color:var(--psi1)">● ψ₁: ${psi1count}</span>
    <span style="color:var(--accent-fg)">● Both: ${bothcount}</span>
  </div>`;

  notes.forEach(note => {
    const borderColor = note.psi === 'psi0' ? 'var(--psi0)' :
                         note.psi === 'psi1' ? 'var(--psi1)' : 'var(--accent-fg)';
    const psiLabel = note.psi === 'psi0' ? 'ψ₀' :
                     note.psi === 'psi1' ? 'ψ₁' : 'ψ₀↔ψ₁';
    html += `<div class="fg-step" style="border-left-color:${borderColor}; margin-bottom:16px">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
        <div class="fg-step-label" style="margin:0">${note.tradition}</div>
        <span style="font-family:Inter; font-size:10px; padding:2px 8px; border-radius:3px; background:rgba(0,0,0,0.04); color:${borderColor}">${psiLabel}</span>
      </div>
      <blockquote style="font-size:15px; line-height:1.7; color:var(--text); margin:0 0 8px; padding-left:16px; border-left:2px solid var(--border-light); font-style:italic">"${note.quote}"</blockquote>
      <div style="font-family:Inter; font-size:10px; color:var(--text-faint); margin-bottom:6px">${note.source} · ${note.date || ''}</div>
      <div class="fg-step-text">${note.why}</div>
    </div>`;
  });

  if (notes.length === 0) {
    html += `<div class="no-draft-msg">Ancient field notes being compiled...</div>`;
  }

  html += `<div class="fg-punchline">Different words. Different centuries. Different continents. Same two things. Same pattern. Same field guide, written over and over, in every language humans ever spoke.</div>`;
  html += `</div>`;
  container.innerHTML = html;
}

// Init
switchTab('book');
</script>

</html>
