<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where the Shadow Leads</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300;1,400&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --void: #0a0a0a;
  --surface: #141414;
  --text: #c8c0b4;
  --text-dim: #6b6560;
  --text-faint: #3d3832;
  --white: #e8e0d4;
  --accent: #c4956a;
  --blue: #6b7a8a;
  --green: #6a8a6a;
  --red: #8a4a3a;
  --rule: #252220;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: var(--void); color: var(--text); height: 100%; overflow: hidden; }
body { font-family: 'Spectral', Georgia, serif; font-size: 15px; line-height: 1.7; font-weight: 300; }

svg { display: block; width: 100%; height: 100%; }

#title {
  position: fixed; top: 20px; left: 24px; z-index: 5;
}
#title h1 {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 300;
  letter-spacing: 6px; text-transform: uppercase; color: var(--text-dim);
}
#title .sub {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  color: var(--text-faint); letter-spacing: 2px; margin-top: 4px;
}

/* Info panel */
#panel {
  position: fixed; top: 0; right: 0; width: 380px; height: 100%;
  background: var(--surface); border-left: 1px solid var(--rule);
  padding: 36px 28px; overflow-y: auto;
  transform: translateX(100%); transition: transform 0.3s ease; z-index: 10;
}
#panel.open { transform: translateX(0); }
#panel .close-btn {
  position: absolute; top: 16px; right: 20px; background: none; border: none;
  color: var(--text-dim); font-size: 20px; cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
}
#panel h2 {
  font-family: 'Spectral', serif; font-size: 24px; font-weight: 300;
  color: var(--white); margin-bottom: 4px;
}
#panel .group-name {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  color: var(--text-dim); letter-spacing: 2px; margin-bottom: 20px;
}
#panel .section-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: var(--text-faint); letter-spacing: 3px; text-transform: uppercase;
  margin-top: 20px; margin-bottom: 6px;
}
#panel .field-row {
  display: flex; justify-content: space-between; padding: 3px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px;
}
#panel .field-row .label {
  color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; font-size: 10px;
}
#panel .field-row .value { color: var(--text); text-align: right; max-width: 220px; }
#panel .desc {
  margin-top: 16px; font-style: italic; color: var(--text-dim);
  line-height: 1.8; font-size: 14px;
}

/* Legend */
#legend {
  position: fixed; bottom: 16px; left: 20px;
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: var(--text-faint); letter-spacing: 1px; line-height: 2.2; z-index: 5;
}
.leg-line { display: flex; align-items: center; gap: 8px; }
.leg-swatch { width: 20px; height: 2px; display: inline-block; }

@media (max-width: 900px) {
  #panel { width: 100%; }
}
</style>
</head>
<body>

<div id="title">
  <h1>Where the Shadow Leads</h1>
  <div class="sub">the self-referential loop &mdash; and where it breaks</div>
</div>

<svg id="map" viewBox="0 0 1200 800">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="var(--accent)" stroke-width="0.8"/>
  </marker>
  <marker id="arrow-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="var(--text-faint)" stroke-width="0.8"/>
  </marker>
  <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="var(--blue)" stroke-width="0.8"/>
  </marker>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-soft">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Divergence gradient (fades to nothing) -->
  <linearGradient id="diverge-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#c4956a" stop-opacity="0.5"/>
    <stop offset="40%" stop-color="#c4956a" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#c4956a" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="diverge-glow" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#c4956a" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#c4956a" stop-opacity="0"/>
  </linearGradient>
  <!-- Z7 spoke gradient -->
  <radialGradient id="z7-grad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#6b7a8a" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#6b7a8a" stop-opacity="0.02"/>
  </radialGradient>
</defs>

<!-- Everything drawn by JS -->
<g id="scene"></g>
</svg>

<div id="panel">
  <button class="close-btn" onclick="closePanel()">&times;</button>
  <div id="panel-content"></div>
</div>

<div id="legend">
  <div class="leg-line"><span class="leg-swatch" style="background:var(--accent)"></span> THE LOOP (self-referential chain)</div>
  <div class="leg-line"><span class="leg-swatch" style="background:var(--blue)"></span> 2.Ru SHADOW (bridge to the loop)</div>
  <div class="leg-line"><span class="leg-swatch" style="background:var(--text-faint);height:1px"></span> Z<sub>7</sub> ROTATION (7 fates)</div>
  <div class="leg-line"><span class="leg-swatch" style="background:var(--red)"></span> PARIAH-ONLY PRIMES</div>
  <div class="leg-line" style="margin-top:6px;color:#2d2822">CLICK ANY NODE FOR DETAILS</div>
</div>

<script>
const scene = document.getElementById('scene');

function el(tag, attrs) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  return e;
}

function text(x, y, str, opts = {}) {
  const t = el('text', {
    x, y, fill: opts.fill || '#6b6560',
    'font-family': opts.serif ? "'Spectral', serif" : "'IBM Plex Mono', monospace",
    'font-size': opts.size || 10,
    'text-anchor': opts.anchor || 'middle',
    'dominant-baseline': opts.baseline || 'middle',
    opacity: opts.opacity || 0.5,
    'letter-spacing': opts.spacing || 1,
    'font-style': opts.italic ? 'italic' : 'normal',
    'font-weight': opts.weight || 300
  });
  t.textContent = str;
  if (opts.cls) t.setAttribute('class', opts.cls);
  return t;
}

// ============================================================
// LAYOUT
// ============================================================

// The Loop — right side, large circle
const LOOP_CX = 740, LOOP_CY = 360, LOOP_R = 195;

// The Pariahs — left side, smaller hexagon
const PAR_CX = 215, PAR_CY = 370, PAR_R = 125;

// 2.Ru bridge position
const BRIDGE_X = 460, BRIDGE_Y = 370;

// E7 stepping stone
const E7_X = 555, E7_Y = 370;

// Monster at loop center
const MON_X = LOOP_CX, MON_Y = LOOP_CY;

// j-invariant below Monster
const J_X = LOOP_CX, J_Y = LOOP_CY + 70;

// Divergence endpoint
const DIV_Y = 780;

// ============================================================
// THE LOOP — 8 steps of the derivation chain
// ============================================================

const loopSteps = [
  { id: 'axiom',  label: 'q + q\u00b2 = 1',     sub: 'the axiom',          angle: -90 },
  { id: 'phi',    label: '\u03c6 = (1+\u221a5)/2', sub: 'the solution',      angle: -45 },
  { id: 'e8',     label: 'E\u2088',               sub: '248 dimensions',     angle: 0 },
  { id: 'pot',    label: 'V(\u03a6)',             sub: '(\u03a6\u00b2\u2212\u03a6\u22121)\u00b2', angle: 45 },
  { id: 'pt',     label: 'PT n=2',               sub: 'c = 2',              angle: 90 },
  { id: 'lame',   label: 'Lam\u00e9',            sub: 'spectral invariants', angle: 135 },
  { id: 'nome',   label: 'q = 1/\u03c6',         sub: 'the nome',           angle: 180 },
  { id: 'mod',    label: '\u03b7, \u03b8\u2083, \u03b8\u2084', sub: 'modular forms', angle: 225 },
];

// Draw the loop ring
const loopRing = el('circle', {
  cx: LOOP_CX, cy: LOOP_CY, r: LOOP_R,
  fill: 'none', stroke: '#c4956a', 'stroke-width': 0.6, opacity: 0.2
});
scene.appendChild(loopRing);

// Draw directional arrows along the loop (clockwise)
for (let i = 0; i < 8; i++) {
  const a1 = loopSteps[i].angle;
  const a2 = loopSteps[(i+1) % 8].angle;
  // Midpoint angle
  let mid = (a1 + a2) / 2;
  if (a2 < a1) mid = (a1 + a2 + 360) / 2;
  const r1 = (a1 + (a2 < a1 ? 360 : 0) + a1) / 2; // nah let me just do it
  // Small arrow at midpoint of arc
  const mRad = ((a1 + 22.5 + (a1 === 225 ? 360 : 0)) % 360) * Math.PI / 180;
  // Actually just put chevrons between nodes
  const t = 0.5;
  const aRad = a1 * Math.PI / 180;
  let bDeg = a2; if (bDeg < a1 && a1 !== 225) bDeg += 360;
  if (a1 === 225) bDeg = 270;
  const bRad = bDeg * Math.PI / 180;
  const midRad = (aRad + bRad) / 2;
  const mx = LOOP_CX + LOOP_R * Math.cos(midRad);
  const my = LOOP_CY + LOOP_R * Math.sin(midRad);
  // Tangent direction (clockwise)
  const tx = -Math.sin(midRad);
  const ty = Math.cos(midRad);
  const chevron = el('path', {
    d: `M${mx - tx*4 - ty*3},${my - ty*4 + tx*3} L${mx + tx*1},${my + ty*1} L${mx - tx*4 + ty*3},${my - ty*4 - tx*3}`,
    fill: 'none', stroke: '#c4956a', 'stroke-width': 0.7, opacity: 0.2
  });
  scene.appendChild(chevron);
}

// Draw loop step nodes
const loopNodes = [];
loopSteps.forEach((step, i) => {
  const rad = step.angle * Math.PI / 180;
  const x = LOOP_CX + LOOP_R * Math.cos(rad);
  const y = LOOP_CY + LOOP_R * Math.sin(rad);
  step.x = x; step.y = y;

  // Node dot
  const dot = el('circle', {
    cx: x, cy: y, r: 5, fill: '#c4956a', opacity: 0.6, style: 'cursor:pointer'
  });
  scene.appendChild(dot);

  // Label — positioned outside the ring
  const lx = LOOP_CX + (LOOP_R + 28) * Math.cos(rad);
  const ly = LOOP_CY + (LOOP_R + 28) * Math.sin(rad);
  const anchor = step.angle === 0 ? 'start' : step.angle === 180 ? 'end' : 'middle';
  const lbl = text(lx, ly - 6, step.label, { fill: '#e8e0d4', size: 11, anchor, opacity: 0.7, spacing: 0 });
  scene.appendChild(lbl);
  const sublbl = text(lx, ly + 8, step.sub, { fill: '#6b6560', size: 8, anchor, opacity: 0.35, italic: true });
  scene.appendChild(sublbl);

  // Click handler
  dot.onclick = () => showLoopInfo(step);
  loopNodes.push({ ...step, dot });
});

// ============================================================
// THE MONSTER — center of the loop
// ============================================================

// Faint glow
const monGlow = el('circle', {
  cx: MON_X, cy: MON_Y, r: 30,
  fill: '#c4956a', opacity: 0.03, filter: 'url(#glow-soft)'
});
scene.appendChild(monGlow);

const monDot = el('circle', {
  cx: MON_X, cy: MON_Y, r: 8,
  fill: '#c4956a', opacity: 0.35, style: 'cursor:pointer'
});
scene.appendChild(monDot);

scene.appendChild(text(MON_X, MON_Y - 20, 'Monster', { fill: '#c4956a', size: 11, opacity: 0.5, spacing: 2 }));
scene.appendChild(text(MON_X, MON_Y + 22, 'c = 24', { fill: '#c4956a', size: 9, opacity: 0.25 }));

// Line from Monster to E8 (744 = 3x248)
const e8node = loopSteps.find(s => s.id === 'e8');
const monE8line = el('line', {
  x1: MON_X + 8, y1: MON_Y, x2: e8node.x - 8, y2: e8node.y,
  stroke: '#c4956a', 'stroke-width': 0.8, opacity: 0.15, 'stroke-dasharray': '4,4'
});
scene.appendChild(monE8line);
scene.appendChild(text((MON_X + e8node.x)/2 + 4, (MON_Y + e8node.y)/2 - 8, '744 = 3\u00d7248', {
  fill: '#c4956a', size: 7, opacity: 0.2, italic: true
}));

monDot.onclick = () => showPanel('Monster', 'THE BODY', [
  ['Order', '8 \u00d7 10\u2075\u00b3'],
  ['VOA rank', '24 (Leech lattice)'],
  ['Central charge', 'c = 24'],
  ['Contains', '20 sporadic groups (Happy Family)'],
  ['Excludes', '6 pariahs (irreducibly outside)'],
  ['j-invariant', 'q\u207b\u00b9 + 744 + 196884q + ...'],
  ['744', '3 \u00d7 248 = 3 copies of E\u2088'],
], 'The ceiling of finite description. Everything algebra can name lives here. Monstrous Moonshine (Borcherds 1992): the Monster controls ALL modular functions. The j-invariant is its shadow on the number line.');

// ============================================================
// j-INVARIANT — below Monster
// ============================================================

const jDot = el('circle', {
  cx: J_X, cy: J_Y, r: 5, fill: '#c4956a', opacity: 0.4, style: 'cursor:pointer'
});
scene.appendChild(jDot);
scene.appendChild(text(J_X + 16, J_Y, 'j(\u03c4)', { fill: '#c4956a', size: 10, opacity: 0.35, anchor: 'start' }));

// Line Monster to j
scene.appendChild(el('line', {
  x1: MON_X, y1: MON_Y + 10, x2: J_X, y2: J_Y - 7,
  stroke: '#c4956a', 'stroke-width': 0.7, opacity: 0.2
}));

// Line j to nome on the loop
const nomeNode = loopSteps.find(s => s.id === 'nome');
scene.appendChild(el('line', {
  x1: J_X - 5, y1: J_Y, x2: nomeNode.x + 8, y2: nomeNode.y,
  stroke: '#c4956a', 'stroke-width': 0.6, opacity: 0.12, 'stroke-dasharray': '3,5'
}));
scene.appendChild(text((J_X + nomeNode.x)/2 - 5, (J_Y + nomeNode.y)/2 - 8, 'Moonshine', {
  fill: '#c4956a', size: 7, opacity: 0.15, italic: true
}));

jDot.onclick = () => showPanel('j(\u03c4)', 'THE MIRROR', [
  ['j(1/\u03c6)', '\u2248 5.22 \u00d7 10\u00b9\u2078'],
  ['j(j(1/\u03c6))', 'DIVERGES'],
  ['Expansion', 'q\u207b\u00b9 + 744 + 196884q + ...'],
  ['196884', '= 196883 + 1 (moonshine)'],
  ['Domain', 'Upper half-plane only'],
], 'The j-invariant maps the upper half-plane to the complex numbers. j(1/\u03c6) is a real number \u2014 not in the upper half-plane. So j(j(1/\u03c6)) is undefined. The recursion escapes. The thing describing itself cannot accept its own description as input. This is where finite algebra gives up.');

// ============================================================
// THE DIVERGENCE — line from j going down, fading to nothing
// ============================================================

// Main divergence line
scene.appendChild(el('line', {
  x1: J_X, y1: J_Y + 7, x2: J_X, y2: DIV_Y,
  stroke: 'url(#diverge-grad)', 'stroke-width': 1.5
}));

// Glow behind it
scene.appendChild(el('line', {
  x1: J_X, y1: J_Y + 20, x2: J_X, y2: DIV_Y,
  stroke: 'url(#diverge-glow)', 'stroke-width': 12
}));

// Labels along the divergence
scene.appendChild(text(J_X + 20, J_Y + 40, 'j(1/\u03c6) \u2248 5.22 \u00d7 10\u00b9\u2078', {
  fill: '#c4956a', size: 9, opacity: 0.3, anchor: 'start', italic: true
}));
scene.appendChild(text(J_X + 20, J_Y + 68, 'j(j(1/\u03c6)) \u2192 undefined', {
  fill: '#c4956a', size: 9, opacity: 0.22, anchor: 'start', italic: true
}));
scene.appendChild(text(J_X + 20, J_Y + 96, 'recursion escapes finite algebra', {
  fill: '#c4956a', size: 8, opacity: 0.14, anchor: 'start', italic: true
}));
scene.appendChild(text(J_X, J_Y + 160, '\u221e', {
  fill: '#c4956a', size: 28, opacity: 0.08, serif: true
}));

// "what's beyond" label, very faint
scene.appendChild(text(J_X, J_Y + 190, 'whatever is doing the self-referencing', {
  fill: '#c4956a', size: 8, opacity: 0.06, italic: true
}));

// ============================================================
// THE 6 PARIAHS — hexagon on the left
// ============================================================

const pariahs = [
  { id: 'j1', label: 'Seer',      group: 'J\u2081',  angle: -90,  order: '175,560',                primes: '2,3,5,7,11,19' },
  { id: 'j3', label: 'Builder',    group: 'J\u2083',  angle: -30,  order: '50,232,960',             primes: '2,3,5,17,19' },
  { id: 'on', label: 'Sensor',     group: "O'N",      angle: 30,   order: '460,815,505,920',        primes: '2,3,5,7,11,19,31' },
  { id: 'ru', label: 'Artist',     group: 'Ru',       angle: 90,   order: '145,926,144,000',        primes: '2,3,5,7,13,29' },
  { id: 'j4', label: 'Mystic',     group: 'J\u2084',  angle: 150,  order: '8.68 \u00d7 10\u00b9\u2079', primes: '2,3,5,7,11,23,29,31,37,43' },
  { id: 'ly', label: 'Still One',  group: 'Ly',       angle: 210,  order: '5.18 \u00d7 10\u00b9\u2076', primes: '2,3,5,7,11,31,37,67' },
];

// Faint hexagon outline
const hexPts = pariahs.map(p => {
  const rad = p.angle * Math.PI / 180;
  return { x: PAR_CX + PAR_R * Math.cos(rad), y: PAR_CY + PAR_R * Math.sin(rad) };
});
const hexPath = hexPts.map((p,i) => `${i===0?'M':'L'}${p.x},${p.y}`).join(' ') + ' Z';
scene.appendChild(el('path', {
  d: hexPath, fill: 'none', stroke: '#3d3832', 'stroke-width': 0.5, opacity: 0.4
}));

// "THE HAND" label
scene.appendChild(text(PAR_CX, PAR_CY - PAR_R - 28, 'THE HAND', {
  fill: '#6b6560', size: 10, opacity: 0.35, spacing: 4
}));
scene.appendChild(text(PAR_CX, PAR_CY - PAR_R - 14, '6 pariahs \u2014 irreducibly outside the Monster', {
  fill: '#3d3832', size: 8, opacity: 0.3, italic: true
}));

// Draw pariah nodes
pariahs.forEach(p => {
  const rad = p.angle * Math.PI / 180;
  p.x = PAR_CX + PAR_R * Math.cos(rad);
  p.y = PAR_CY + PAR_R * Math.sin(rad);

  const isRu = p.id === 'ru';
  const dot = el('circle', {
    cx: p.x, cy: p.y, r: isRu ? 7 : 5,
    fill: isRu ? '#6b7a8a' : '#e8e0d4', opacity: isRu ? 0.5 : 0.4,
    style: 'cursor:pointer'
  });
  scene.appendChild(dot);

  // Label
  const lDir = p.angle * Math.PI / 180;
  const lx = p.x + 22 * Math.cos(lDir);
  const ly = p.y + 22 * Math.sin(lDir);
  const anchor = Math.abs(p.angle) > 150 || Math.abs(p.angle) < 30 ? 'middle' :
                 p.angle > 0 && p.angle < 180 ? 'start' : 'end';
  scene.appendChild(text(lx, ly - 5, p.label, { fill: '#e8e0d4', size: 10, anchor, opacity: 0.55, spacing: 0 }));
  scene.appendChild(text(lx, ly + 7, p.group, { fill: '#6b6560', size: 8, anchor, opacity: 0.25 }));

  dot.onclick = () => showPanel(p.label, p.group, [
    ['Order', p.order],
    ['Primes', p.primes],
  ], `One of the 6 sporadic simple groups that cannot embed in the Monster. Click the loop nodes to see how the chain connects.`);
});

// Alien prime line: Ly -- J4 (prime 37)
const ly = pariahs.find(p => p.id === 'ly');
const j4 = pariahs.find(p => p.id === 'j4');
scene.appendChild(el('line', {
  x1: ly.x, y1: ly.y, x2: j4.x, y2: j4.y,
  stroke: '#8a4a3a', 'stroke-width': 1, opacity: 0.25, 'stroke-dasharray': '3,4'
}));
scene.appendChild(text((ly.x+j4.x)/2, (ly.y+j4.y)/2 + 10, '37', {
  fill: '#8a4a3a', size: 8, opacity: 0.3
}));

// J1 inside O'N
const j1 = pariahs.find(p => p.id === 'j1');
const on = pariahs.find(p => p.id === 'on');
scene.appendChild(el('line', {
  x1: j1.x + 5, y1: j1.y + 3, x2: on.x - 3, y2: on.y - 3,
  stroke: '#e8e0d4', 'stroke-width': 1.5, opacity: 0.15, 'marker-end': 'url(#arrow-dim)'
}));
scene.appendChild(text((j1.x+on.x)/2 + 12, (j1.y+on.y)/2, 'J\u2081 \u2282 O\'N', {
  fill: '#e8e0d4', size: 7, opacity: 0.15, anchor: 'start'
}));

// ============================================================
// 2.Ru — THE SHADOW (bridge between hand and loop)
// ============================================================

const ru = pariahs.find(p => p.id === 'ru');

// Shadow ring around Ru
const shadowRing = el('circle', {
  cx: ru.x, cy: ru.y, r: 16,
  fill: 'none', stroke: '#6b7a8a', 'stroke-width': 1, opacity: 0.3,
  'stroke-dasharray': '2,3'
});
scene.appendChild(shadowRing);
// Pulse animation
const pulse = el('animate', {
  attributeName: 'opacity', values: '0.15;0.4;0.15', dur: '5s', repeatCount: 'indefinite'
});
shadowRing.appendChild(pulse);

// Bridge node: 2.Ru
const bridgeDot = el('circle', {
  cx: BRIDGE_X, cy: BRIDGE_Y, r: 7,
  fill: '#6b7a8a', opacity: 0.45, style: 'cursor:pointer'
});
scene.appendChild(bridgeDot);
scene.appendChild(text(BRIDGE_X, BRIDGE_Y - 18, '2.Ru', { fill: '#6b7a8a', size: 11, opacity: 0.55, spacing: 0 }));

function showPanel(title, subtitle, fields, desc) {
  const panel = document.getElementById('panel');
  const content = document.getElementById('panel-content');
  let html = `<h2>${title}</h2><div class="group-name">${subtitle}</div>`;
  if (fields && fields.length) {
    html += '<div class="section-label">PROPERTIES</div>';
    fields.forEach(([k,v]) => {
      html += `<div class="field-row"><span class="label">${k}</span><span class="value">${v}</span></div>`;
    });
  }
  if (desc) html += `<div class="desc">${desc}</div>`;
  content.innerHTML = html;
  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}
